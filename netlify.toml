[build]
  publish = "frontend"
  command = ""

# Proxy all API calls to Railway backend
[[redirects]]
  from = "/restaurants/*"
  to = "https://gab-dining-club-production.up.railway.app/restaurants/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/restaurants"
  to = "https://gab-dining-club-production.up.railway.app/restaurants"
  status = 200
  force = true


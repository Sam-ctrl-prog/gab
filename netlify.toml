[build]
  publish = "frontend"

# Proxy all API calls to Railway backend
[[redirects]]
  from = "/restaurants/*"
  to = "https://RAILWAY_URL/restaurants/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/restaurants"
  to = "https://RAILWAY_URL/restaurants"
  status = 200
  force = true

[[redirects]]
  from = "/map/*"
  to = "https://RAILWAY_URL/map/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/menus/*"
  to = "https://RAILWAY_URL/menus/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/cuisines/*"
  to = "https://RAILWAY_URL/cuisines/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/crm/*"
  to = "https://RAILWAY_URL/crm/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/reminders/*"
  to = "https://RAILWAY_URL/reminders/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/rsvp/*"
  to = "https://RAILWAY_URL/rsvp/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "https://RAILWAY_URL/health"
  status = 200
  force = true

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>GAB — Menus</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#534AB7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="GAB">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <link rel="stylesheet" href="/static/style.css">
<style>
  /* ── Segment ── */
  .segment { display:flex; background:var(--s2); border-radius:10px; padding:3px; gap:2px; margin-bottom:14px; }
  .seg-btn { flex:1; padding:8px; border-radius:8px; font-size:13px; font-weight:500; color:var(--muted); text-align:center; cursor:pointer; transition:all .15s; }
  .seg-btn.active { background:var(--surface); color:var(--text); box-shadow:0 1px 3px rgba(0,0,0,.08); }

  /* ── Menu card ── */
  .menu-card {
    background:var(--surface); border:0.5px solid var(--b1);
    border-radius:var(--r); padding:12px 14px;
    cursor:pointer; margin-bottom:6px;
    transition:background .12s; -webkit-tap-highlight-color:transparent;
  }
  .menu-card:active { background:var(--s2); }
  .menu-card-head { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:4px; }
  .menu-card-name { font-size:13px; font-weight:600; color:var(--text); }
  .menu-card-meta { font-size:11px; color:var(--muted); margin-bottom:5px; }
  .menu-card-foot { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }

  .src-badge {
    font-size:10px; padding:2px 8px; border-radius:20px;
    background:var(--blue-50); color:var(--blue-600);
  }
  .src-badge.manual { background:var(--s2); color:var(--dim); }
  .cuisine-badge { font-size:10px; padding:2px 8px; border-radius:20px; background:var(--teal-50); color:var(--teal-600); }

  /* ── Search results ── */
  .search-result {
    background:var(--surface); border:0.5px solid var(--b1);
    border-radius:var(--r); padding:12px 14px; margin-bottom:6px;
  }
  .sr-item { font-size:13px; font-weight:500; color:var(--text); margin-bottom:2px; }
  .sr-desc { font-size:12px; color:var(--dim); margin-bottom:4px; line-height:1.5; }
  .sr-foot { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .sr-rest { font-size:11px; color:var(--purple-600); font-weight:500; }
  .sr-price { font-size:11px; color:var(--muted); }
  .sr-score { font-size:11px; padding:2px 8px; border-radius:20px; background:var(--purple-50); color:var(--purple-800); }

  /* ── Detail sheet ── */
  .detail-sheet { position:fixed; inset:0; z-index:400; background:rgba(0,0,0,.2); backdrop-filter:blur(2px); display:none; align-items:flex-end; }
  .detail-sheet.open { display:flex; }
  .detail-body { background:var(--surface); border-radius:20px 20px 0 0; width:100%; max-height:92dvh; overflow-y:auto; padding:16px 16px calc(var(--bottom-nav-h)+20px); box-shadow:0 -8px 40px rgba(0,0,0,.12); }
  .detail-handle { width:36px; height:4px; background:var(--b2); border-radius:2px; margin:0 auto 14px; cursor:pointer; }

  .cuisine-block { background:var(--s2); border-radius:10px; padding:12px; margin-bottom:12px; }
  .cuisine-type { font-size:16px; font-weight:600; color:var(--text); margin-bottom:2px; }
  .cuisine-sub  { font-size:12px; color:var(--muted); margin-bottom:8px; }
  .conf-bar { height:4px; background:var(--s3); border-radius:3px; overflow:hidden; margin-bottom:6px; }
  .conf-fill { height:100%; background:var(--purple-400); border-radius:3px; }
  .dish-pills { display:flex; flex-wrap:wrap; gap:4px; }
  .dish-pill { font-size:11px; padding:3px 10px; border-radius:20px; background:var(--purple-50); color:var(--purple-800); }

  .category-head { font-size:10px; font-weight:500; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); padding:10px 0 4px; border-bottom:0.5px solid var(--b1); margin-bottom:6px; }
  .item-row { padding:8px 0; border-bottom:0.5px solid var(--b1); display:flex; gap:8px; align-items:flex-start; }
  .item-row:last-child { border-bottom:none; }
  .item-body { flex:1; }
  .item-name { font-size:13px; font-weight:500; }
  .item-desc { font-size:12px; color:var(--dim); margin-top:2px; line-height:1.5; }
  .item-price { font-size:13px; font-weight:600; color:var(--purple-600); flex-shrink:0; }

  /* ── Add modal tabs ── */
  .tab-bar { display:flex; border-bottom:0.5px solid var(--b1); margin-bottom:14px; gap:4px; }
  .tab-item { padding:8px 14px; font-size:13px; font-weight:500; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; }
  .tab-item.active { color:var(--purple-600); border-bottom-color:var(--purple-400); }
  .tab-pane { display:none; }
  .tab-pane.active { display:block; }

  .rest-search-wrap { position:relative; margin-bottom:12px; }
  .rest-dropdown { position:absolute; top:calc(100% + 2px); left:0; right:0; background:var(--surface); border:0.5px solid var(--b2); border-radius:var(--r); max-height:180px; overflow-y:auto; z-index:20; box-shadow:0 4px 20px rgba(0,0,0,.1); display:none; }
  .rest-dropdown.open { display:block; }
  .drop-item { padding:9px 14px; cursor:pointer; font-size:13px; border-bottom:0.5px solid var(--b1); }
  .drop-item:last-child { border-bottom:none; }
  .drop-item:active { background:var(--s2); }
</style>
</head>
<body>

<!-- Top bar -->
<div class="top-bar">
  <span class="top-bar-title">Menus</span>
  <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ Add</button>
</div>

<!-- Page -->
<div class="page">
  <!-- Segment -->
  <div class="segment">
    <div class="seg-btn active" onclick="switchSeg(this,'browse')">Browse</div>
    <div class="seg-btn" onclick="switchSeg(this,'search')">Search dishes</div>
  </div>

  <!-- Browse view -->
  <div id="view-browse">
    <div id="menu-list"></div>
  </div>

  <!-- Search view -->
  <div id="view-search" style="display:none">
    <div class="search-bar" style="margin-bottom:12px">
      <span class="search-icon">🔍</span>
      <input id="dish-search" type="text" placeholder="Search dishes, ingredients…" oninput="debounceSearch(this.value)">
    </div>
    <div id="search-results">
      <div class="empty"><div class="empty-icon">🍽️</div><div class="empty-text">Search across all menus</div></div>
    </div>
  </div>
</div>

<!-- Menu detail sheet -->
<div class="detail-sheet" id="detail-sheet" onclick="maybeClose(event)">
  <div class="detail-body">
    <div class="detail-handle" onclick="document.getElementById('detail-sheet').classList.remove('open')"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <div style="font-size:18px;font-weight:600" id="d-rest-name"></div>
      <button class="btn btn-sm" style="color:var(--coral-600);background:var(--coral-50)" onclick="deleteMenu()">Delete</button>
    </div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px" id="d-meta"></div>

    <div id="d-cuisine"></div>

    <button class="btn btn-outline btn-sm" style="margin-bottom:12px" id="d-match-btn" onclick="runMatch()">✦ Run AI cuisine match</button>

    <div id="d-items"></div>
  </div>
</div>

<!-- Add menu modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Add menu</div>

    <!-- Restaurant picker -->
    <div class="form-group">
      <label>Restaurant</label>
      <div class="rest-search-wrap">
        <div class="search-bar">
          <span class="search-icon">🍴</span>
          <input id="add-rest-search" type="text" placeholder="Search restaurant…" oninput="onAddRestSearch(this.value)" autocomplete="off">
        </div>
        <div class="rest-dropdown" id="add-rest-dropdown"></div>
      </div>
      <div id="add-rest-locked" style="display:none;align-items:center;gap:8px;padding:9px 14px;background:var(--teal-50);color:var(--teal-600);border-radius:10px;font-size:13px;font-weight:500;margin-bottom:12px">
        <span id="add-rest-name"></span>
        <span style="margin-left:auto;cursor:pointer;opacity:.7" onclick="clearAddRest()">×</span>
      </div>
    </div>

    <!-- Tabs: URL / Paste -->
    <div class="tab-bar">
      <div class="tab-item active" onclick="switchTab(this,'tab-url')">URL</div>
      <div class="tab-item" onclick="switchTab(this,'tab-text')">Paste text</div>
    </div>

    <div id="tab-url" class="tab-pane active">
      <div class="form-group">
        <label>Menu URL</label>
        <input id="add-url" type="url" placeholder="https://restaurantname.com/menu">
      </div>
    </div>
    <div id="tab-text" class="tab-pane">
      <div class="form-group">
        <label>Paste menu text</label>
        <textarea id="add-text" rows="6" placeholder="Paste the menu text here…"></textarea>
      </div>
    </div>

    <div id="add-status" style="font-size:12px;color:var(--muted);margin-bottom:8px;display:none"></div>

    <div class="modal-actions">
      <button class="btn btn-outline" style="flex:1" onclick="closeModal('add-modal')">Cancel</button>
      <button class="btn btn-primary" style="flex:2" id="add-submit" onclick="submitMenu()">Ingest menu</button>
    </div>
  </div>
</div>

<!-- Bottom nav -->
<nav class="bottom-nav">
  <a href="/map.html" class="nav-item"><span class="nav-icon">🗺️</span><span>Discover</span></a>
  <a href="/events.html" class="nav-item"><span class="nav-icon">📅</span><span>Events</span></a>
  <a href="/crm.html" class="nav-item"><span class="nav-icon">👥</span><span>Members</span></a>
  <a href="/menus.html" class="nav-item active"><span class="nav-icon">🍽️</span><span>Menus</span></a>
</nav>

<div class="ptr-indicator" id="ptr">↻</div>
<div id="toast-stack"></div>
<div id="toast"></div>

<script>
const get  = url=>fetch(url).then(r=>r.json());
const post = (url,d,method="POST")=>fetch(url,{method,headers:{"Content-Type":"application/json"},body:d?JSON.stringify(d):undefined}).then(r=>r.json());
const del  = url=>fetch(url,{method:"DELETE"}).then(r=>r.json());

function skeletonCards(n=5){
  return Array.from({length:n},()=>`
    <div class="skel-card" style="flex-direction:column;align-items:flex-start;gap:8px;padding:12px 14px">
      <div style="display:flex;justify-content:space-between;width:100%">
        <div class="skel skel-line" style="width:50%"></div>
        <div class="skel skel-line-sm" style="width:15%"></div>
      </div>
      <div class="skel skel-line-sm" style="width:30%"></div>
      <div style="display:flex;gap:6px">
        <div class="skel skel-line-sm" style="width:60px;border-radius:20px"></div>
        <div class="skel skel-line-sm" style="width:80px;border-radius:20px"></div>
      </div>
    </div>`).join("");
}
function toast(msg, type="") {
  const stack = document.getElementById("toast-stack");
  const el = document.createElement("div");
  el.className = "toast-item" + (type ? " " + type : "");
  el.textContent = msg;
  stack.appendChild(el);
  setTimeout(() => {
    el.classList.add("out");
    setTimeout(() => el.remove(), 200);
  }, 2800);
}
function closeModal(id){document.getElementById(id).classList.remove("open");}
function maybeClose(e){if(e.target===document.getElementById("detail-sheet"))document.getElementById("detail-sheet").classList.remove("open");}

// ── State ─────────────────────────────────────────────────────────────────
let allMenus=[], allRestaurants=[], addRestId=null, currentMenuId=null;
let searchTimer=null;

// ── Segments ──────────────────────────────────────────────────────────────
function switchSeg(btn,view){
  document.querySelectorAll(".seg-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("view-browse").style.display=view==="browse"?"":"none";
  document.getElementById("view-search").style.display=view==="search"?"":"none";
}

// ── Browse ────────────────────────────────────────────────────────────────
async function loadMenus(){
  document.getElementById("menu-list").innerHTML = skeletonCards(5);
  try{
    allMenus=await get("/menus");
    renderMenuList(allMenus);
  }catch(e){toast("Could not load menus","error");}
}

function relDate(iso){
  if(!iso)return"";
  const diff=Date.now()-new Date(iso);
  const days=Math.floor(diff/86400000);
  if(days<1)return"today";
  if(days<7)return`${days}d ago`;
  if(days<30)return`${Math.floor(days/7)}w ago`;
  return`${Math.floor(days/30)}mo ago`;
}

function renderMenuList(menus){
  const el=document.getElementById("menu-list");
  if(!menus.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><div class="empty-text" style="margin-bottom:14px">No menus yet</div><button class="btn btn-primary btn-sm" onclick="openAddModal()">Add first menu</button></div>`;
    return;
  }
  el.innerHTML=menus.map(m=>`<div class="menu-card" onclick="openDetail(${m.id})">
    <div class="menu-card-head">
      <span class="menu-card-name">${m.restaurant_name||"Unknown"}</span>
      <span style="font-size:11px;color:var(--muted)">${m.item_count} items</span>
    </div>
    <div class="menu-card-meta">${relDate(m.ingested_at)}</div>
    <div class="menu-card-foot">
      <span class="src-badge ${m.source_type==='text'?'manual':''}">${m.source_type==='url'?'🔗 URL':'📋 Manual'}</span>
      ${m.cuisine_match?`<span class="cuisine-badge">✦ ${m.cuisine_match}</span>`:""}
    </div>
  </div>`).join("");
}

// ── Detail ────────────────────────────────────────────────────────────────
async function openDetail(id){
  currentMenuId=id;
  try{
    const m=await get(`/menus/${id}`);
    document.getElementById("d-rest-name").textContent=allMenus.find(x=>x.id===id)?.restaurant_name||"Menu";
    document.getElementById("d-meta").textContent=`${m.source_type==="url"?"URL":"Manual"} · ${m.items.length} items`;

    // Cuisine block
    const cuisineEl=document.getElementById("d-cuisine");
    if(m.cuisine_match){
      let parsed={};
      try{ parsed=typeof m.cuisine_match==="string"?JSON.parse(m.cuisine_match):m.cuisine_match; }catch(e){ parsed={primary_type:m.cuisine_match}; }
      const conf=parsed.confidence?Math.round(parsed.confidence*100):null;
      const dishes=(parsed.signature_dishes||[]).slice(0,6);
      cuisineEl.innerHTML=`<div class="cuisine-block">
        <div class="cuisine-type">${parsed.primary_type||m.cuisine_match}</div>
        ${parsed.sub_type?`<div class="cuisine-sub">${parsed.sub_type}</div>`:""}
        ${conf!==null?`<div class="conf-bar"><div class="conf-fill" style="width:${conf}%"></div></div><div style="font-size:10px;color:var(--muted);margin-bottom:6px">${conf}% confidence</div>`:""}
        ${dishes.length?`<div class="dish-pills">${dishes.map(d=>`<span class="dish-pill">${d}</span>`).join("")}</div>`:""}
        ${parsed.reasoning?`<div style="font-size:11px;color:var(--dim);margin-top:8px;line-height:1.5">${parsed.reasoning}</div>`:""}
      </div>`;
    } else { cuisineEl.innerHTML=""; }

    // Items grouped by category
    const byCategory={};
    m.items.forEach(i=>{ const k=i.category||"Other"; (byCategory[k]=byCategory[k]||[]).push(i); });
    const itemsHtml=Object.entries(byCategory).map(([cat,items])=>`
      <div class="category-head">${cat}</div>
      ${items.map(i=>`<div class="item-row">
        <div class="item-body">
          <div class="item-name">${i.name}</div>
          ${i.description?`<div class="item-desc">${i.description}</div>`:""}
        </div>
        ${i.price!=null?`<div class="item-price">$${i.price}</div>`:""}
      </div>`).join("")}
    `).join("");
    document.getElementById("d-items").innerHTML=itemsHtml||`<div style="color:var(--muted);font-size:13px;padding:8px 0">No items parsed</div>`;

    document.getElementById("detail-sheet").classList.add("open");
  }catch(e){toast("Could not load menu","error");}
}

async function runMatch(){
  const btn=document.getElementById("d-match-btn");
  btn.textContent="Running…"; btn.disabled=true;
  try{
    await post(`/menus/${currentMenuId}/match-cuisine`,null);
    toast("Cuisine matched!","success");
    await loadMenus();
    openDetail(currentMenuId);
  }catch(e){toast("Match failed","error");}
  btn.textContent="✦ Run AI cuisine match"; btn.disabled=false;
}

async function deleteMenu(){
  if(!confirm("Delete this menu?"))return;
  try{
    await del(`/menus/${currentMenuId}`);
    document.getElementById("detail-sheet").classList.remove("open");
    toast("Deleted","success"); loadMenus();
  }catch(e){toast("Could not delete","error");}
}

// ── Semantic search ───────────────────────────────────────────────────────
function debounceSearch(val){
  clearTimeout(searchTimer);
  if(!val.trim()){
    document.getElementById("search-results").innerHTML=`<div class="empty"><div class="empty-icon">🍽️</div><div class="empty-text">Search across all menus</div></div>`;
    return;
  }
  document.getElementById("search-results").innerHTML=`<div style="text-align:center;padding:24px;color:var(--muted);font-size:13px">Searching…</div>`;
  searchTimer=setTimeout(()=>doSearch(val),450);
}

async function doSearch(q){
  try{
    const results=await get(`/menus/search?query=${encodeURIComponent(q)}&top_k=20`);
    const el=document.getElementById("search-results");
    if(!results.length){ el.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">No results</div></div>`; return; }
    el.innerHTML=results.map(r=>`<div class="search-result">
      <div class="sr-item">${r.item_name}</div>
      ${r.description?`<div class="sr-desc">${r.description}</div>`:""}
      <div class="sr-foot">
        <span class="sr-rest">${r.restaurant_name||"Unknown"}</span>
        ${r.price!=null?`<span class="sr-price">$${r.price}</span>`:""}
        <span class="sr-score">${Math.round(r.score*100)}% match</span>
      </div>
    </div>`).join("");
  }catch(e){document.getElementById("search-results").innerHTML=`<div style="text-align:center;padding:24px;color:var(--coral-600);font-size:13px">Search failed — check OpenAI key</div>`;}
}

// ── Add menu modal ────────────────────────────────────────────────────────
async function openAddModal(){
  if(!allRestaurants.length) allRestaurants=await get("/restaurants?limit=200").catch(()=>[]);
  addRestId=null;
  document.getElementById("add-rest-search").value="";
  document.getElementById("add-rest-locked").style.display="none";
  document.getElementById("add-url").value="";
  document.getElementById("add-text").value="";
  document.getElementById("add-status").style.display="none";
  document.getElementById("add-modal").classList.add("open");
}

function onAddRestSearch(val){
  const drop=document.getElementById("add-rest-dropdown");
  if(!val){drop.classList.remove("open");return;}
  const hits=allRestaurants.filter(r=>r.name.toLowerCase().includes(val.toLowerCase())).slice(0,8);
  drop.innerHTML=hits.map(r=>`<div class="drop-item" onclick="selectAddRest(${r.id},'${r.name.replace(/'/g,"\\'")}')">
    ${r.name} <span style="font-size:11px;color:var(--muted)">${r.neighborhood||r.borough||""}</span>
  </div>`).join("");
  drop.classList.toggle("open",hits.length>0);
}

function selectAddRest(id,name){
  addRestId=id;
  document.getElementById("add-rest-dropdown").classList.remove("open");
  document.getElementById("add-rest-search").value="";
  document.getElementById("add-rest-name").textContent=name;
  document.getElementById("add-rest-locked").style.display="flex";
}

function clearAddRest(){
  addRestId=null;
  document.getElementById("add-rest-locked").style.display="none";
}

function switchTab(btn,pane){
  document.querySelectorAll(".tab-item").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-pane").forEach(p=>p.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById(pane).classList.add("active");
}

async function submitMenu(){
  if(!addRestId){toast("Select a restaurant first","error");return;}
  const statusEl=document.getElementById("add-status");
  const submitBtn=document.getElementById("add-submit");
  const isUrl=document.getElementById("tab-url").classList.contains("active");

  statusEl.style.display=""; statusEl.textContent="Ingesting…";
  submitBtn.disabled=true;

  try{
    let result;
    if(isUrl){
      const url=document.getElementById("add-url").value.trim();
      if(!url){toast("Enter a URL","error");submitBtn.disabled=false;statusEl.style.display="none";return;}
      result=await post(`/menus/ingest/url?restaurant_id=${addRestId}&url=${encodeURIComponent(url)}`,null);
    } else {
      const text=document.getElementById("add-text").value.trim();
      if(!text){toast("Paste some text","error");submitBtn.disabled=false;statusEl.style.display="none";return;}
      result=await post(`/menus/ingest/text?restaurant_id=${addRestId}&text=${encodeURIComponent(text)}`,null);
    }
    closeModal("add-modal");
    toast(`Menu added — ${result.items_count} items!`,"success");
    loadMenus();
  }catch(e){toast("Ingest failed","error");}
  submitBtn.disabled=false;
  statusEl.style.display="none";
}

// ── Pull to refresh ───────────────────────────────────────────────────────
(function(){
  const ptr=document.getElementById("ptr");
  let startY=0, pulling=false, threshold=72;
  document.addEventListener("touchstart",e=>{
    if(window.scrollY===0){startY=e.touches[0].clientY;pulling=true;}
  },{passive:true});
  document.addEventListener("touchmove",e=>{
    if(!pulling)return;
    if(e.touches[0].clientY-startY>20)ptr.classList.add("visible");
  },{passive:true});
  document.addEventListener("touchend",e=>{
    if(!pulling)return;pulling=false;
    const dy=e.changedTouches[0].clientY-startY;
    if(dy>threshold){ptr.classList.add("spinning");loadMenus().then(()=>ptr.classList.remove("spinning","visible"));}
    else ptr.classList.remove("visible");
  });
})();

// ── Keyboard shortcuts ────────────────────────────────────────────────────
document.addEventListener("keydown", e => {
  if (e.key === "/" && document.activeElement.tagName !== "INPUT" && document.activeElement.tagName !== "TEXTAREA") {
    e.preventDefault();
    // Switch to search tab and focus
    const searchSeg = document.querySelectorAll(".seg-btn")[1];
    switchSeg(searchSeg, "search");
    setTimeout(() => document.getElementById("dish-search").focus(), 50);
  }
  if (e.key === "Escape") {
    document.querySelectorAll(".modal-overlay.open, .detail-sheet.open").forEach(el => el.classList.remove("open"));
  }
});

// ── Init ──────────────────────────────────────────────────────────────────
loadMenus();
const p=new URLSearchParams(location.search);
if(p.get("menu_id")) setTimeout(()=>openDetail(parseInt(p.get("menu_id"))),500);
</script>

<script>
// ── Page transitions ─────────────────────────────────────────────────────
document.body.style.opacity = '0';
document.body.style.transition = 'opacity .15s ease';
requestAnimationFrame(() => { document.body.style.opacity = '1'; });
document.querySelectorAll('.bottom-nav a').forEach(a => {
  a.addEventListener('click', e => {
    const href = a.getAttribute('href');
    if (!href || href === location.pathname || href === '#') return;
    e.preventDefault();
    document.body.style.opacity = '0';
    setTimeout(() => { location.href = href; }, 150);
  });
});
</script>


<script>
// ── Haptic feedback ───────────────────────────────────────────────────────
document.addEventListener('click', e => {
  const target = e.target.closest('button, .btn, .pill, .rc, .contact-card, .ev-card, .menu-card, .nav-item');
  if (target && navigator.vibrate) navigator.vibrate(8);
}, { passive: true });
</script>


<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js").catch(() => {});
}
</script>
</body>
</html>
